name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

permissions:
  contents: write

jobs:
  test:
    name: Unit tests
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  build:
    name: Build portable exe
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Build executable
        run: python -m PyInstaller --noconfirm build.spec

      - name: Smoke-test the executable (--selftest)
        run: |
          .\dist\MDfier.exe --selftest
          if ($LASTEXITCODE -ne 0) { Get-Content .\mdfier_selftest.log; exit 1 }
          Get-Content .\mdfier_selftest.log

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDfier-windows
          path: dist/MDfier.exe

      - name: Publish release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/MDfier.exe
